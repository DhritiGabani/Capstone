<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DorsiFlexx · Leaderboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Purple ambient glow — bottom-left, matches screenshot */
    .bg-glow {
      position: fixed;
      bottom: -120px;
      left: -120px;
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(75, 0, 120, 0.42) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 32px 64px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
    }

    .site-sub {
      font-size: 12px;
      letter-spacing: 6px;
      color: #666;
      text-transform: uppercase;
    }

    .accent-rule {
      width: 120px;
      height: 2px;
      margin: 12px auto 18px;
      background: linear-gradient(90deg, transparent, #7C3FEE, transparent);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px;
      border-radius: 30px;
      background: #0a0a0a;
      border: 1px solid #252525;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #ddd;
      cursor: default;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: dot-blink 1.6s ease-in-out infinite;
    }

    @keyframes dot-blink { 0%,100%{opacity:1;} 50%{opacity:.35;} }

    /* ── Podium ── */
    .podium {
      display: flex;
      justify-content: center;
      align-items: center;   /* all pod-wraps centred so crown aligns above card */
      gap: 14px;
      padding: 12px 0 40px;
    }

    .pod-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Crown row — visible for #1, invisible placeholder for #2/#3 so cards align */
    .crown-row {
      height: 38px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      font-size: 26px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .pod-card {
      border-radius: 18px;
      padding: 26px 22px 22px;
      text-align: center;
      min-width: 190px;
      border: 1px solid rgba(255,255,255,0.06);
      cursor: default;
      transition: transform .18s;
    }
    .pod-card:hover { transform: translateY(-5px); }

    .pod-1 {
      background: #181400;
      border-color: rgba(255,200,0,0.14);
      min-width: 215px;
    }
    .pod-2 { background: #181818; }
    .pod-3 {
      background: #161200;
      border-color: rgba(185,105,0,0.12);
    }

    .pod-icon    { font-size: 44px; display: block; margin-bottom: 14px; }
    .pod-name    { font-size: 17px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; margin: 0 auto 8px; }
    .pod-score   { font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 8px; }
    .pod-time    { font-size: 12px; color: #555; }

    .pod-1 .pod-score { font-size: 40px; color: #F5B800; }
    .pod-2 .pod-score { color: #fff; font-size: 34px; }
    .pod-3 .pod-score { color: #CD8C3A; font-size: 32px; }

    /* ── Rankings list ── */
    .list-section { margin-top: 0; }

    .col-head {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      padding: 0 20px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #444;
      text-transform: uppercase;
    }
    .col-head .ch-score { text-align: right; }

    .entry {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      align-items: center;
      padding: 15px 20px;
      background: #111;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: default;
      transition: background .15s;
    }
    .entry:hover { background: #161616; }

    .entry.new-entry {
      animation: flash-new 2.5s ease-out forwards;
    }
    @keyframes flash-new {
      0%  { background: rgba(124,63,238,.18); }
      100%{ background: #111; }
    }

    .e-rank   { font-size: 16px; font-weight: 700; color: #777; }
    .e-name   { font-size: 15px; font-weight: 700; color: #fff; }
    .e-time   { font-size: 12px; color: #555; margin-top: 2px; }
    .e-score  { font-size: 18px; font-weight: 700; color: #fff; text-align: right; }

    /* ── Footer ── */
    .footer { text-align: center; color: #444; font-size: 13px; margin-top: 28px; }

    /* ── Empty / loading / error ── */
    .state { text-align: center; padding: 80px 20px; color: #444; font-size: 15px; line-height: 1.8; }
    .spinner { width: 30px; height: 30px; border: 2px solid #222; border-top-color: #7C3FEE; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .site-title { font-size: 36px; letter-spacing: 2px; }
      .pod-card { min-width: 105px; padding: 18px 10px 16px; border-radius: 14px; }
      .pod-1 { min-width: 120px; }
      .pod-icon { font-size: 32px; margin-bottom: 10px; }
      .pod-name { font-size: 13px; }
      .pod-1 .pod-score { font-size: 28px; }
      .pod-2 .pod-score { font-size: 24px; }
      .pod-3 .pod-score { font-size: 22px; }
      .col-head, .entry { grid-template-columns: 56px 1fr auto; }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="wrapper">

  <!-- Header -->
  <header class="header">
    <img
      src="/logo.png"
      alt="DorsiFlexx"
      style="height:260px; width:auto; mix-blend-mode:screen; margin-bottom:-80px;"
    />
    <div class="site-sub">Knee-to-Wall Challenge</div>
    <div class="accent-rule"></div>
    <div class="live-badge" id="liveBadge">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveLabel">LIVE</span>
    </div>
  </header>

  <!-- Podium -->
  <div id="podiumSection" style="display:none">
    <div class="podium" id="podiumCards"></div>
  </div>

  <!-- Rankings list (rank 4+) -->
  <div id="listSection" style="display:none">
    <div class="col-head">
      <span>Rank</span>
      <span>Player</span>
      <span class="ch-score">Score</span>
    </div>
    <div id="rows"></div>
  </div>

  <!-- Loading / empty / error -->
  <div id="stateBox">
    <div class="state">
      <div class="spinner"></div>
      Loading…
    </div>
  </div>

  <div class="footer" id="footer"></div>

</div>

<script>
  function fmtTime(iso) {
    try {
      return new Date(iso).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: true });
    } catch { return ''; }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  let knownIds = new Set();
  let cachedData = [];

  /* ── Podium (top 3) ── */
  function renderPodium(top3, newIds) {
    const section = document.getElementById('podiumSection');
    const container = document.getElementById('podiumCards');
    if (!top3.length) { section.style.display = 'none'; return; }
    section.style.display = '';

    // Visual order: [2nd left, 1st centre, 3rd right]
    const slots = [
      top3[1] ? { item: top3[1], cls: 'pod-2', icon: '🥈', crown: false } : null,
      {           item: top3[0], cls: 'pod-1', icon: '🏆', crown: true  },
      top3[2] ? { item: top3[2], cls: 'pod-3', icon: '🥉', crown: false } : null,
    ].filter(Boolean);

    container.innerHTML = slots.map(({ item, cls, icon, crown }) => `
      <div class="pod-wrap">
        <div class="crown-row">${crown ? '👑' : ''}</div>
        <div class="pod-card ${cls}">
          <span class="pod-icon">${icon}</span>
          <div class="pod-name">${esc(item.player_name)}</div>
          <div class="pod-score">${item.angle_deg.toFixed(1)}°</div>
          <div class="pod-time">${fmtTime(item.measured_at)}</div>
        </div>
      </div>`).join('');
  }

  /* ── Rows (rank 4+) ── */
  function renderRows(entries, newIds) {
    const section = document.getElementById('listSection');
    const container = document.getElementById('rows');
    if (!entries.length) { section.style.display = 'none'; container.innerHTML = ''; return; }
    section.style.display = '';

    container.innerHTML = entries.map((item, i) => `
      <div class="entry${newIds.has(item.id) ? ' new-entry' : ''}">
        <div class="e-rank">#${i + 4}</div>
        <div>
          <div class="e-name">${esc(item.player_name)}</div>
          <div class="e-time">${fmtTime(item.measured_at)}</div>
        </div>
        <div class="e-score">${item.angle_deg.toFixed(1)}°</div>
      </div>`).join('');
  }

  /* ── Full render ── */
  function render(data, newIds = new Set()) {
    const stateBox = document.getElementById('stateBox');
    const footer   = document.getElementById('footer');

    if (!data.length) {
      document.getElementById('podiumSection').style.display = 'none';
      document.getElementById('listSection').style.display = 'none';
      stateBox.innerHTML = '<div class="state">No scores yet.<br>Complete a Knee-to-Wall test to appear here.</div>';
      stateBox.style.display = '';
      footer.textContent = '';
      return;
    }

    stateBox.style.display = 'none';
    renderPodium(data.slice(0, 3), newIds);
    renderRows(data.slice(3), newIds);
    footer.textContent = `${data.length} participant${data.length === 1 ? '' : 's'}`;
  }

  /* ── Fetch ── */
  async function fetchAndRender(fromUpdate = false) {
    try {
      const res = await fetch('/ktw/leaderboard');
      if (!res.ok) throw new Error();
      const data = await res.json();
      const newIds = fromUpdate
        ? new Set(data.map(e => e.id).filter(id => !knownIds.has(id)))
        : new Set();
      knownIds = new Set(data.map(e => e.id));
      cachedData = data;
      render(data, newIds);
    } catch {
      if (!cachedData.length) {
        document.getElementById('stateBox').innerHTML =
          '<div class="state">Could not reach the server.<br>Make sure the backend is running on port 8000.</div>';
        document.getElementById('stateBox').style.display = '';
      }
    }
  }

  /* ── SSE live connection ── */
  function setLive(on) {
    const dot   = document.getElementById('liveDot');
    const label = document.getElementById('liveLabel');
    dot.style.background   = on ? '#22c55e' : '#ef4444';
    dot.style.boxShadow    = on ? '0 0 6px #22c55e' : '0 0 6px #ef4444';
    dot.style.animation    = on ? 'dot-blink 1.6s ease-in-out infinite' : 'none';
    label.textContent      = on ? 'LIVE' : 'RECONNECTING…';
  }

  function connectSSE() {
    const es = new EventSource('/ktw/leaderboard/stream');
    es.onopen    = () => setLive(true);
    es.onmessage = () => fetchAndRender(true);
    es.onerror   = () => { setLive(false); es.close(); setTimeout(connectSSE, 3000); };
  }

  fetchAndRender();
  connectSSE();
</script>
</body>
</html>
